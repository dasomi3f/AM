<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>인공근육 Lab. 접근</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #0f172a;
            --card: #111827;
            --border: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #14b8a6;
            --error: #f87171;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 20%, rgba(20,184,166,0.12), transparent 32%),
                        radial-gradient(circle at 80% 30%, rgba(59,130,246,0.14), transparent 36%),
                        radial-gradient(circle at 50% 80%, rgba(236,72,153,0.10), transparent 40%),
                        var(--bg);
            font-family: 'Noto Sans KR', system-ui, -apple-system, 'Segoe UI', sans-serif;
            color: var(--text);
        }
        .card {
            width: min(420px, 92vw);
            background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            backdrop-filter: blur(10px);
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }
        .title {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }
        .subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
        }
        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: 600;
            font-size: 13px;
        }
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px 44px 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #0b1220;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(20,184,166,0.18);
        }
        .toggle-btn {
            position: absolute;
            right: 8px;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
        }
        .toggle-btn:hover { color: var(--text); }
        .actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid transparent;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }
        .primary {
            background: linear-gradient(135deg, #14b8a6, #22d3ee);
            color: #0b1220;
            box-shadow: 0 12px 30px rgba(20,184,166,0.45);
        }
        .primary:hover { transform: translateY(-1px); }
        .secondary {
            background: transparent;
            color: var(--muted);
            border-color: var(--border);
        }
        .secondary:hover { color: var(--text); }
        .hint {
            margin-top: 12px;
            font-size: 12px;
            color: var(--muted);
        }
        .error { color: var(--error); margin-top: 10px; font-size: 13px; }
        .shake { animation: shake 0.26s linear; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="header">
            <div>
                <p class="title">접근 비밀번호를 입력하세요</p>
                <p class="subtitle">인공근육 Lab. 연구 대시보드</p>
            </div>
            <div style="font-size:22px">🔒</div>
        </div>

        <label for="pw-input">Password</label>
        <div class="input-wrap">
            <input type="password" id="pw-input" autocomplete="current-password" placeholder="비밀번호를 입력" />
            <button type="button" class="toggle-btn" id="toggle-visibility" aria-label="비밀번호 보기">👁️</button>
        </div>
        <div id="error" class="error" aria-live="polite" style="display:none">비밀번호가 올바르지 않습니다.</div>

        <div class="actions">
            <button class="secondary" type="button" id="reset-btn">초기화</button>
            <button class="primary" type="button" id="submit-btn">입장하기</button>
        </div>
        <div class="hint">올바른 비밀번호 입력 시 연구 대시보드(index.html)로 이동합니다.</div>
    </div>

    <script>
        const PASSWORD = 'drb@1234';
        const input = document.getElementById('pw-input');
        const errorBox = document.getElementById('error');
        const card = document.getElementById('card');

        function trySubmit() {
            const value = (input.value || '').trim();
            if (value === PASSWORD) {
                sessionStorage.setItem('am_pw_verified', '1');
                window.location.href = 'index.html';
                return;
            }
            errorBox.style.display = 'block';
            card.classList.remove('shake');
            void card.offsetWidth; // trigger reflow for animation restart
            card.classList.add('shake');
            input.focus();
        }

        document.getElementById('submit-btn').addEventListener('click', trySubmit);
        document.getElementById('reset-btn').addEventListener('click', () => {
            input.value = '';
            errorBox.style.display = 'none';
            input.focus();
        });
        document.getElementById('toggle-visibility').addEventListener('click', () => {
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                trySubmit();
            }
        });

        // 바로 이전 세션에서 인증한 경우 자동 이동
        if (sessionStorage.getItem('am_pw_verified') === '1') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
